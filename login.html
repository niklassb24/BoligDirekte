<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoligDirekte — Log ind</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:         #E8920A;
      --amber-light:   #F5B93A;
      --white:         #FFFFFF;
      --page-bg:       #F9F8F5;
      --nav-bg:        rgba(255,255,255,0.93);
      --nav-border:    rgba(15,30,60,0.09);
      --nav-shadow:    rgba(15,30,60,0.08);
      --grid-color:    rgba(15,30,60,0.05);
      --radial-1:      rgba(245,158,11,0.10);
      --radial-2:      rgba(20,55,210,0.06);
      --radial-3:      rgba(245,158,11,0.04);
      --blob-a:        rgba(245,158,11,0.09);
      --blob-b:        rgba(20,55,200,0.07);
      --beam-h1:       rgba(232,146,10,0.50);
      --beam-h2:       rgba(20,55,200,0.28);
      --beam-h3:       rgba(232,146,10,0.22);
      --beam-v1:       rgba(232,146,10,0.32);
      --beam-v2:       rgba(20,55,200,0.18);
      --vignette:      rgba(220,215,205,0.35);
      --text-main:     #0F1E3D;
      --text-muted:    #64748B;
      --border:        rgba(15,30,60,0.09);
      --logo-color:    #0F1E3D;
      --h1-color:      #0F1E3D;
      --input-bg:      #FFFFFF;
      --input-border:  rgba(15,30,60,0.12);
      --input-color:   #0F1E3D;
      --input-ph:      rgba(15,30,60,0.35);
      --btn-bg:        #0F1E3D;
      --btn-color:     #FFFFFF;
      --btn-hover:     #1a3160;
      --card-bg:       #FFFFFF;
      --card-shadow:   0 4px 32px rgba(15,30,60,0.08);
      --label-color:   rgba(15,30,60,0.55);
      --divider:       rgba(15,30,60,0.08);
      --footer-bg:     #080f22;
    }

    [data-theme="dark"] {
      --page-bg:       #070f28;
      --nav-bg:        rgba(7,15,40,0.90);
      --nav-border:    rgba(255,255,255,0.06);
      --nav-shadow:    rgba(0,0,0,0.45);
      --grid-color:    rgba(255,255,255,0.055);
      --radial-1:      rgba(245,158,11,0.11);
      --radial-2:      rgba(20,55,210,0.22);
      --radial-3:      rgba(245,158,11,0.05);
      --blob-a:        rgba(245,158,11,0.14);
      --blob-b:        rgba(25,70,220,0.19);
      --beam-h1:       rgba(245,158,11,0.70);
      --beam-h2:       rgba(100,150,255,0.60);
      --beam-h3:       rgba(245,158,11,0.40);
      --beam-v1:       rgba(245,158,11,0.50);
      --beam-v2:       rgba(100,150,255,0.45);
      --vignette:      rgba(5,8,18,0.65);
      --text-main:     #FFFFFF;
      --text-muted:    #8899bb;
      --border:        rgba(255,255,255,0.08);
      --logo-color:    #FFFFFF;
      --h1-color:      #FFFFFF;
      --input-bg:      rgba(255,255,255,0.06);
      --input-border:  rgba(255,255,255,0.12);
      --input-color:   #FFFFFF;
      --input-ph:      rgba(255,255,255,0.35);
      --btn-bg:        #F59E0B;
      --btn-color:     #050a18;
      --btn-hover:     #FCD34D;
      --card-bg:       rgba(255,255,255,0.03);
      --card-shadow:   0 4px 32px rgba(0,0,0,0.30);
      --label-color:   rgba(255,255,255,0.45);
      --divider:       rgba(255,255,255,0.08);
      --footer-bg:     transparent;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--page-bg); color: var(--text-main); overflow-x: hidden; min-height: 100vh; transition: background 0.4s, color 0.4s; }

    .page-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; background: var(--page-bg); transition: background 0.4s; }
    .page-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 55px 55px; mask-image: linear-gradient(to bottom, black 0%, black 45%, transparent 100%); }
    .page-radial { position: absolute; inset: 0; background: radial-gradient(ellipse 55% 45% at 12% 22%, var(--radial-1) 0%, transparent 62%), radial-gradient(ellipse 50% 50% at 88% 78%, var(--radial-2) 0%, transparent 60%), radial-gradient(ellipse 35% 35% at 55% 50%, var(--radial-3) 0%, transparent 55%); }
    .blob-amber { position: absolute; top: -8%; left: 2%; width: 600px; height: 480px; background: var(--blob-a); border-radius: 62% 38% 54% 46% / 44% 58% 42% 56%; filter: blur(100px); animation: morph-a 14s ease-in-out infinite; }
    .blob-blue { position: absolute; bottom: -10%; right: 0%; width: 620px; height: 500px; background: var(--blob-b); border-radius: 45% 55% 40% 60% / 56% 44% 56% 44%; filter: blur(120px); animation: morph-b 18s ease-in-out infinite; }
    .beam { position: absolute; pointer-events: none; }
    .beam-h1 { top: 19%; height: 2px; width: 340px; background: linear-gradient(to right, transparent, var(--beam-h1) 50%, transparent); filter: blur(1px); animation: sweep-h 10s cubic-bezier(0.4,0,0.6,1) 0s infinite; }
    .beam-h2 { top: 55%; height: 1px; width: 220px; background: linear-gradient(to right, transparent, var(--beam-h2) 50%, transparent); filter: blur(0.5px); animation: sweep-h 13s cubic-bezier(0.4,0,0.6,1) 4s infinite; }
    .beam-v1 { left: 20%; width: 1px; height: 280px; background: linear-gradient(to bottom, transparent, var(--beam-v1) 50%, transparent); filter: blur(0.5px); animation: sweep-v 12s cubic-bezier(0.4,0,0.6,1) 2s infinite; }
    .page-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse 85% 70% at 50% 35%, transparent 50%, var(--vignette) 100%); }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; background: var(--nav-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--nav-border); transition: box-shadow 0.3s, background 0.4s; }
    nav.scrolled { box-shadow: 0 2px 28px var(--nav-shadow); }
    .logo { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--logo-color); letter-spacing: -0.02em; text-decoration: none; transition: color 0.4s; }
    .logo span { color: var(--amber); }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .theme-toggle { display: flex; align-items: center; gap: 0.4rem; background: var(--input-bg); border: 1px solid var(--nav-border); border-radius: 100px; padding: 0.3rem 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; color: var(--text-muted); transition: all 0.3s; white-space: nowrap; }
    .theme-toggle:hover { border-color: var(--amber); color: var(--text-main); }
    .theme-toggle svg { width: 14px; height: 14px; flex-shrink: 0; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    .theme-toggle .icon-sun { display: none; }
    .nav-btn { background: var(--btn-bg); color: var(--btn-color); border: none; padding: 0.6rem 1.4rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.1s; text-decoration: none; }
    .nav-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }

    main { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 8rem 1.5rem 4rem; }

    .login-wrap { width: 100%; max-width: 420px; }

    .login-label { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(232,146,10,0.1); border: 1px solid rgba(232,146,10,0.25); color: var(--amber); padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 1.5rem; animation: fadeDown 0.5s ease both; }

    .login-wrap h1 { font-family: 'Fraunces', serif; font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 700; color: var(--h1-color); line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 0.75rem; animation: fadeDown 0.5s 0.05s ease both; }
    .login-wrap h1 em { font-style: italic; color: var(--amber); }
    .login-wrap > p { font-size: 1rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 2rem; font-weight: 300; animation: fadeDown 0.5s 0.1s ease both; }

    .login-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; box-shadow: var(--card-shadow); animation: fadeDown 0.5s 0.15s ease both; backdrop-filter: blur(8px); }

    .field { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1rem; }
    .field label { font-size: 0.82rem; font-weight: 500; color: var(--label-color); letter-spacing: 0.02em; }
    .field input { padding: 0.85rem 1.1rem; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--input-color); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .field input::placeholder { color: var(--input-ph); }
    .field input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(232,146,10,0.12); }

    .forgot { text-align: right; margin-top: -0.5rem; margin-bottom: 1rem; }
    .forgot a { font-size: 0.8rem; color: var(--amber); text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }

    .submit-btn { width: 100%; background: var(--btn-bg); color: var(--btn-color); border: none; padding: 1rem; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .submit-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }

    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--divider); }
    .divider span { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

    .register-link { text-align: center; font-size: 0.88rem; color: var(--text-muted); }
    .register-link a { color: var(--amber); text-decoration: none; font-weight: 500; }
    .register-link a:hover { text-decoration: underline; }

    .error-msg { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.88rem; color: #DC2626; margin-bottom: 1rem; display: none; }

    footer { background: var(--footer-bg); padding: 2rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 1; }
    .footer-logo { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 0.5rem; }
    .footer-logo span { color: var(--amber); }
    footer p { font-size: 0.78rem; color: rgba(255,255,255,0.3); }

    @media (max-width: 640px) {
      nav { padding: 1rem 1.25rem; }
      .toggle-label { display: none; }
      .theme-toggle { padding: 0.3rem 0.5rem; }
      .nav-btn { padding: 0.55rem 0.9rem; font-size: 0.82rem; }
      .nav-right { gap: 0.5rem; }
      .login-card { padding: 1.75rem 1.25rem; }
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes morph-a { 0% { border-radius: 62% 38% 54% 46% / 44% 58% 42% 56%; transform: translate(0,0) scale(1); } 50% { border-radius: 38% 62% 60% 40% / 42% 58% 42% 58%; transform: translate(-15px, 15px) scale(0.97); } 100% { border-radius: 62% 38% 54% 46% / 44% 58% 42% 56%; transform: translate(0,0) scale(1); } }
    @keyframes morph-b { 0% { border-radius: 45% 55% 40% 60% / 56% 44% 56% 44%; transform: translate(0,0) scale(1); } 50% { border-radius: 40% 60% 45% 55% / 60% 40% 60% 40%; transform: translate(20px, 15px) scale(0.96); } 100% { border-radius: 45% 55% 40% 60% / 56% 44% 56% 44%; transform: translate(0,0) scale(1); } }
    @keyframes sweep-h { 0% { left: -25%; opacity: 0; } 6% { opacity: 1; } 94% { opacity: 1; } 100% { left: 115%; opacity: 0; } }
    @keyframes sweep-v { 0% { top: -25%; opacity: 0; } 6% { opacity: 1; } 94% { opacity: 1; } 100% { top: 115%; opacity: 0; } }
  </style>
</head>
<body>

  <div class="page-bg" aria-hidden="true">
    <div class="page-radial"></div>
    <div class="blob-amber"></div>
    <div class="blob-blue"></div>
    <div class="page-grid"></div>
    <div class="beam beam-h1"></div>
    <div class="beam beam-h2"></div>
    <div class="beam beam-v1"></div>
    <div class="page-vignette"></div>
  </div>

  <nav id="nav">
    <a class="logo" href="boligdirekte.html">Bolig<span>Direkte</span></a>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Skift tema">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span class="toggle-label">Mørk</span>
      </button>
      <a class="nav-btn" href="tilmeld.html">Opret konto</a>
    </div>
  </nav>

  <main>
    <div class="login-wrap">
      <div class="login-label">👋 Velkommen tilbage</div>
      <h1>Log ind på<br><em>BoligDirekte</em></h1>
      <p>Få adgang til din profil og dit boligsalg.</p>

      <div class="login-card">
        <div class="error-msg" id="error-msg"></div>

        <div class="field">
          <label>E-mailadresse</label>
          <input type="email" id="email" placeholder="anders@example.dk" />
        </div>
        <div class="field">
          <label>Adgangskode</label>
          <input type="password" id="password" placeholder="Din adgangskode" />
        </div>

        <div class="forgot">
          <a href="#" onclick="resetPassword()">Glemt adgangskode?</a>
        </div>

        <button class="submit-btn" id="login-btn" onclick="login()">Log ind →</button>

        <div class="divider"><span>eller</span></div>

        <div class="register-link">
          Har du ikke en konto? <a href="tilmeld.html">Opret dig gratis</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">Bolig<span>Direkte</span></div>
    <p>© 2025 BoligDirekte · Platform under udvikling</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAH0mxBKo3iFUyB5ZKnTvdYEneXPyuvu5I",
      authDomain: "boligside-3dbfa.firebaseapp.com",
      projectId: "boligside-3dbfa",
      storageBucket: "boligside-3dbfa.firebasestorage.app",
      messagingSenderId: "938144668707",
      appId: "1:938144668707:web:df10e4a5116ff9939fa596"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    window.toggleTheme = function() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next === 'dark' ? 'dark' : '');
      localStorage.setItem('theme', next);
      document.querySelector('.toggle-label').textContent = next === 'dark' ? 'Lys' : 'Mørk';
    };
    (function() {
      const saved = localStorage.getItem('theme') || 'light';
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.addEventListener('DOMContentLoaded', () => {
          document.querySelector('.toggle-label').textContent = 'Lys';
        });
      }
    })();

    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
    });

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.login();
    });

    window.login = async function() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('error-msg');
      const btn      = document.getElementById('login-btn');

      errorEl.style.display = 'none';
      if (!email || !password) {
        errorEl.textContent = 'Udfyld e-mail og adgangskode.';
        errorEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Logger ind...';
      btn.disabled = true;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const uid  = cred.user.uid;
        const [sellerSnap, buyerSnap] = await Promise.all([
          getDoc(doc(db, 'saelgere', uid)),
          getDoc(doc(db, 'koebere',  uid))
        ]);
        const roles = [];
        if (sellerSnap.exists()) roles.push('saelger');
        if (buyerSnap.exists())  roles.push('koeber');
        localStorage.setItem('bd_roles', JSON.stringify(roles));
        localStorage.setItem('bd_role',  roles[0] || 'saelger');
        window.location.href = 'dashboard.html';
      } catch (err) {
        let msg = 'Noget gik galt — prøv igen.';
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
          msg = 'Forkert e-mail eller adgangskode.';
        }
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        btn.textContent = 'Log ind →';
        btn.disabled = false;
      }
    };

    window.resetPassword = async function() {
      const email = document.getElementById('email').value.trim();
      const errorEl = document.getElementById('error-msg');
      if (!email) {
        errorEl.textContent = 'Skriv din e-mail først, så sender vi et nulstillingslink.';
        errorEl.style.display = 'block';
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        errorEl.style.background = 'rgba(22,163,74,0.08)';
        errorEl.style.borderColor = 'rgba(22,163,74,0.25)';
        errorEl.style.color = '#16A34A';
        errorEl.textContent = 'Nulstillingslink sendt til ' + email;
        errorEl.style.display = 'block';
      } catch(err) {
        errorEl.textContent = 'Kunne ikke sende link — tjek e-mailadressen.';
        errorEl.style.display = 'block';
      }
    };
  </script>
</body>
</html>
